<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Révisions</title>
<style>
  :root{
    --bg:#F5F6F1; --card:#FFFFFF; --text:#2E3327; --text-dim:#8C9A7E;
    --accent:#6E8360; --accent-dark:#4F6144; --accent2:#D97B5F; --line:#E4E7DE;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  .wrap{max-width:520px; margin:0 auto; padding:24px 18px 60px;}

  /* ---------- HOME ---------- */
  header.home{margin-bottom:22px;}
  header.home h1{font-size:24px; margin:0 0 4px; color:var(--accent-dark); letter-spacing:-0.01em;}
  header.home .sub{color:var(--text-dim); font-size:13.5px;}

  .status{
    background:#fff; border-radius:12px; padding:14px 16px; margin-bottom:18px;
    font-size:13px; color:var(--text-dim); border:1px solid var(--line);
  }
  .status.error{color:#B4482F; border-color:#F0C4BE; background:#FBEEEB;}

  .matiere-group{margin-bottom:22px;}
  .matiere-label{
    font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--accent); margin-bottom:10px; padding-left:2px;
  }
  .quiz-card{
    background:var(--card); border-radius:var(--radius); padding:18px 20px; margin-bottom:10px;
    border:1px solid var(--line); cursor:pointer; display:flex; align-items:center; gap:14px;
    transition:transform .12s;
  }
  .quiz-card:active{transform:scale(0.98);}
  .quiz-emoji{font-size:26px; flex-shrink:0;}
  .quiz-info{flex:1; min-width:0;}
  .quiz-title{font-size:15.5px; font-weight:600; margin-bottom:3px;}
  .quiz-count{font-size:12px; color:var(--text-dim);}
  .quiz-arrow{color:var(--text-dim); font-size:18px;}

  .empty{text-align:center; color:var(--text-dim); padding:50px 20px; font-size:14px;}

  /* ---------- SESSION ---------- */
  .session{display:none;}
  .session.active{display:block;}
  header.home.hidden, .home-content.hidden{display:none;}

  .session-top{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .back-btn{
    background:var(--card); border:1px solid var(--line); border-radius:10px; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--accent-dark);
    cursor:pointer; flex-shrink:0;
  }
  .session-title{flex:1; min-width:0;}
  .session-title .name{font-size:15px; font-weight:700;}
  .session-title .pos{font-size:12px; color:var(--text-dim);}

  .progress-track{height:6px; background:var(--line); border-radius:10px; overflow:hidden; margin-bottom:26px;}
  .progress-fill{height:100%; background:var(--accent); border-radius:10px; transition:width .3s;}

  .card{
    background:var(--card); border-radius:22px; padding:26px 22px; margin-bottom:18px;
    border:1px solid var(--line); box-shadow:0 4px 16px rgba(46,51,39,0.05);
    min-height:220px; display:flex; flex-direction:column;
  }
  .tag{
    display:inline-block; align-self:flex-start; font-size:10.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; padding:4px 11px; border-radius:20px; margin-bottom:16px;
  }
  .tag.qcm{background:#E9EDE4; color:var(--accent-dark);}
  .tag.flashcard{background:#FBE9E2; color:#B4482F;}

  .question{font-size:18px; font-weight:600; margin-bottom:20px; line-height:1.45; flex-shrink:0;}

  .choice{
    display:block; width:100%; text-align:left; background:#FAFAF7; border:1.5px solid var(--line);
    border-radius:12px; padding:13px 16px; margin-bottom:9px; font-size:14.5px; color:var(--text);
    cursor:pointer; font-family:inherit;
  }
  .choice:active{transform:scale(0.98);}
  .choice.correct{background:#E9F5E6; border-color:var(--accent); color:var(--accent-dark); font-weight:600;}
  .choice.wrong{background:#FBEEEB; border-color:var(--accent2); color:#B4482F;}
  .choice:disabled{cursor:default;}

  .flip-zone{flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; text-align:center;}
  .flip-btn{
    background:var(--accent); color:white; border:none; padding:12px 22px; border-radius:12px;
    font-size:14.5px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .answer-reveal{font-size:16px; color:var(--accent-dark); font-weight:600; line-height:1.5; display:none;}
  .answer-reveal.show{display:block;}

  .fiche-link{display:inline-block; margin-top:14px; font-size:12.5px; color:var(--accent2); text-decoration:none;}

  .next-btn{
    width:100%; background:var(--accent-dark); color:white; border:none; padding:15px; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .next-btn.show{opacity:1; pointer-events:auto;}

  .recap{text-align:center; padding:50px 20px;}
  .recap .big{font-size:44px; margin-bottom:10px;}
  .recap h2{font-size:20px; margin:0 0 8px; color:var(--accent-dark);}
  .recap p{color:var(--text-dim); font-size:14px; margin-bottom:26px;}
  .recap .restart{
    background:var(--accent); color:white; border:none; padding:13px 24px; border-radius:12px;
    font-size:14.5px; font-weight:600; cursor:pointer; font-family:inherit;
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="homeScreen">
    <header class="home">
      <h1>🎓 Révisions</h1>
      <div class="sub">Choisis un quiz pour commencer</div>
    </header>
    <div id="status" class="status">Chargement…</div>
    <div id="homeContent"></div>
  </div>

  <div id="sessionScreen" class="session">
    <div class="session-top">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="session-title">
        <div class="name" id="sessionName"></div>
        <div class="pos" id="sessionPos"></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div id="cardZone"></div>
  </div>

</div>

<script>
const SHEET_ID = "1yTjT6wCStPIL9E-JoCJfIWe8XOwjKSNOBmQvjL7MaDw";
const API_BASE = "https://opensheet.elk.sh/" + SHEET_ID;

const EMOJIS = ["📘","🧠","🔬","📗","🩺","📙","🦻","📕"];

let allQuizzes = [];
let allQuestions = [];
let currentQuiz = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answeredCount = 0;

const statusEl = document.getElementById('status');
const homeContent = document.getElementById('homeContent');
const homeScreen = document.getElementById('homeScreen');
const sessionScreen = document.getElementById('sessionScreen');

Promise.all([
  fetch(API_BASE + "/Quiz").then(r => { if(!r.ok) throw new Error('Quiz sheet: HTTP ' + r.status); return r.json(); }),
  fetch(API_BASE + "/Questions").then(r => { if(!r.ok) throw new Error('Questions sheet: HTTP ' + r.status); return r.json(); })
]).then(([quizzes, questions]) => {
  allQuizzes = quizzes;
  allQuestions = questions;
  statusEl.style.display = 'none';
  renderHome();
}).catch(err => {
  statusEl.className = 'status error';
  statusEl.textContent = "❌ Impossible de charger les données. Vérifie le partage du Sheet et les noms d'onglets (\"Quiz\" et \"Questions\").";
  console.error(err);
});

function renderHome(){
  if(allQuizzes.length === 0){
    homeContent.innerHTML = '<div class="empty">Aucun quiz pour l\'instant.<br>Ajoute une ligne dans l\'onglet "Quiz" de ton Sheet.</div>';
    return;
  }
  const byMatiere = {};
  allQuizzes.forEach(q => {
    const m = (q.Matière || q.Matiere || 'Autre').trim() || 'Autre';
    if(!byMatiere[m]) byMatiere[m] = [];
    byMatiere[m].push(q);
  });

  homeContent.innerHTML = Object.entries(byMatiere).map(([matiere, quizzes]) => {
    const cards = quizzes.map((q, i) => {
      const count = allQuestions.filter(qu => String(qu.ID_Quiz).trim() === String(q.ID_Quiz).trim()).length;
      const emoji = EMOJIS[Math.abs(hashCode(q.Titre || '')) % EMOJIS.length];
      return `<div class="quiz-card" onclick="openQuiz('${escapeAttr(q.ID_Quiz)}')">
        <span class="quiz-emoji">${emoji}</span>
        <div class="quiz-info">
          <div class="quiz-title">${escapeHtml(q.Titre || 'Sans titre')}</div>
          <div class="quiz-count">${count} question${count>1?'s':''}</div>
        </div>
        <span class="quiz-arrow">›</span>
      </div>`;
    }).join('');
    return `<div class="matiere-group">
      <div class="matiere-label">${escapeHtml(matiere)}</div>
      ${cards}
    </div>`;
  }).join('');
}

function hashCode(str){
  let hash = 0;
  for(let i=0; i<str.length; i++){ hash = ((hash<<5)-hash) + str.charCodeAt(i); hash |= 0; }
  return hash;
}

function openQuiz(idQuiz){
  currentQuiz = allQuizzes.find(q => String(q.ID_Quiz).trim() === String(idQuiz).trim());
  currentQuestions = allQuestions.filter(q => String(q.ID_Quiz).trim() === String(idQuiz).trim());
  currentIndex = 0;
  score = 0;
  answeredCount = 0;
  homeScreen.style.display = 'none';
  sessionScreen.classList.add('active');
  document.getElementById('sessionName').textContent = currentQuiz ? currentQuiz.Titre : '';
  renderCard();
}

function goHome(){
  sessionScreen.classList.remove('active');
  homeScreen.style.display = 'block';
}

function renderCard(){
  const total = currentQuestions.length;
  if(currentIndex >= total){
    renderRecap();
    return;
  }
  const row = currentQuestions[currentIndex];
  document.getElementById('sessionPos').textContent = `Question ${currentIndex+1} / ${total}`;
  document.getElementById('progressFill').style.width = `${(currentIndex/total)*100}%`;

  const type = (row.Type || '').trim().toLowerCase();
  const isQCM = type === 'qcm';
  let html = `<div class="card">
    <span class="tag ${isQCM?'qcm':'flashcard'}">${isQCM?'QCM':'Flashcard'}</span>
    <div class="question">${escapeHtml(row.Question)}</div>`;

  if(isQCM){
    const choices = [['A', row.Choix_A], ['B', row.Choix_B], ['C', row.Choix_C]].filter(c => c[1] && c[1].trim());
    html += choices.map(([letter, text]) =>
      `<button class="choice" data-letter="${letter}" onclick="answerQCM(this,'${escapeAttr((row.Bonne_Reponse||'').trim())}')">${escapeHtml(text)}</button>`
    ).join('');
    if(row.Lien_Fiche && row.Lien_Fiche.trim()){
      html += `<a class="fiche-link" href="${row.Lien_Fiche}" target="_blank">📄 Voir la fiche</a>`;
    }
    html += `</div><button class="next-btn" id="nextBtn" onclick="nextCard()">Suivant</button>`;
  } else {
    html += `<div class="flip-zone">
      <button class="flip-btn" id="flipBtn" onclick="flipCard()">Voir la réponse</button>
      <div class="answer-reveal" id="answerReveal">${escapeHtml(row.Bonne_Reponse)}</div>
    </div>`;
    if(row.Lien_Fiche && row.Lien_Fiche.trim()){
      html += `<a class="fiche-link" href="${row.Lien_Fiche}" target="_blank">📄 Voir la fiche</a>`;
    }
    html += `</div><button class="next-btn" id="nextBtn" onclick="nextCard()">Suivant</button>`;
  }

  document.getElementById('cardZone').innerHTML = html;
}

function answerQCM(btn, correct){
  const letter = btn.dataset.letter;
  const siblings = btn.parentElement.querySelectorAll('.choice');
  siblings.forEach(s => {
    s.disabled = true;
    if(s.dataset.letter === correct) s.classList.add('correct');
  });
  if(letter !== correct) btn.classList.add('wrong');
  else score++;
  answeredCount++;
  document.getElementById('nextBtn').classList.add('show');
}

function flipCard(){
  document.getElementById('answerReveal').classList.add('show');
  document.getElementById('flipBtn').style.display = 'none';
  document.getElementById('nextBtn').classList.add('show');
}

function nextCard(){
  currentIndex++;
  renderCard();
}

function renderRecap(){
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('sessionPos').textContent = 'Terminé';
  const hasQCM = currentQuestions.some(q => (q.Type||'').trim().toLowerCase() === 'qcm');
  document.getElementById('cardZone').innerHTML = `
    <div class="recap">
      <div class="big">🎉</div>
      <h2>Quiz terminé !</h2>
      <p>${hasQCM ? `Score : ${score} / ${currentQuestions.filter(q=>(q.Type||'').trim().toLowerCase()==='qcm').length} bonnes réponses` : `${currentQuestions.length} cartes revues`}</p>
      <button class="restart" onclick="openQuiz('${escapeAttr(currentQuiz.ID_Quiz)}')">Recommencer</button>
      <br><br>
      <button class="back-btn" style="display:inline-flex; width:auto; padding:0 18px;" onclick="goHome()">← Retour aux quiz</button>
    </div>`;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escapeAttr(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
</script>
</body>
</html>
