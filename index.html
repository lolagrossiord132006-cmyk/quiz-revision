<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Révisions</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Révisions">
<meta name="theme-color" content="#F5F6F1">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#F5F6F1; --card:#FFFFFF; --text:#2E3327; --text-dim:#8C9A7E;
    --accent:#6E8360; --accent-dark:#4F6144; --accent2:#D97B5F; --line:#E4E7DE;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  .wrap{max-width:520px; margin:0 auto; padding:calc(24px + env(safe-area-inset-top)) 18px calc(60px + env(safe-area-inset-bottom));}
  @media (min-width: 700px){
    .wrap{max-width:760px;}
  }
  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- HOME ---------- */
  header.home{margin-bottom:20px;}
  header.home h1{font-size:24px; margin:0 0 4px; color:var(--accent-dark); letter-spacing:-0.01em;}
  header.home .sub{color:var(--text-dim); font-size:13.5px;}

  .status{
    background:#fff; border-radius:12px; padding:14px 16px; margin-bottom:18px;
    font-size:13px; color:var(--text-dim); border:1px solid var(--line);
  }
  .status.error{color:#B4482F; border-color:#F0C4BE; background:#FBEEEB;}

  select.matiere-select{
    width:100%; background:var(--card); border:1.5px solid var(--line); border-radius:12px;
    padding:12px 14px; font-size:14.5px; color:var(--text); font-family:inherit; margin-bottom:20px;
    appearance:none; -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%236E8360'><path d='M5 8l5 5 5-5z'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; background-size:16px;
  }

  .progress-section{margin-bottom:26px;}
  .progress-section-title{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:12px;}
  .rings-row{display:flex; gap:14px; flex-wrap:wrap;}
  .ring-item{
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 10px;
    display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; min-width:92px;
  }
  .ring-svg{width:64px; height:64px;}
  .ring-svg .track{fill:none; stroke:var(--line); stroke-width:6;}
  .ring-svg .fill{fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dasharray .4s;}
  .ring-svg .fill.complete{stroke:var(--accent2);}
  .ring-center{font-size:12px; font-weight:700; fill:var(--accent-dark);}
  .ring-name{font-size:11.5px; font-weight:600; text-align:center; color:var(--text); line-height:1.3;}
  .ring-count{font-size:10.5px; color:var(--text-dim);}

  .matiere-group{margin-bottom:22px;}
  .matiere-label{
    font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--accent); margin-bottom:10px; padding-left:2px;
  }
  .quiz-grid{display:grid; grid-template-columns:1fr; gap:10px;}
  @media (min-width: 700px){
    .quiz-grid{grid-template-columns:1fr 1fr;}
  }
  .quiz-card{
    background:var(--card); border-radius:var(--radius); padding:18px 20px; margin-bottom:0;
    border:1px solid var(--line); cursor:pointer; display:flex; align-items:center; gap:14px;
    transition:transform .12s; position:relative;
  }
  .quiz-card:active{transform:scale(0.98);}
  .quiz-emoji{font-size:26px; flex-shrink:0;}
  .quiz-info{flex:1; min-width:0;}
  .quiz-title{font-size:15.5px; font-weight:600; margin-bottom:3px; display:flex; align-items:center; gap:6px;}
  .quiz-count{font-size:12px; color:var(--text-dim);}
  .quiz-arrow{color:var(--text-dim); font-size:18px;}
  .done-badge{font-size:12px; color:var(--accent);}

  .empty{text-align:center; color:var(--text-dim); padding:50px 20px; font-size:14px;}

  /* ---------- OPTIONS ---------- */
  .top-bar{display:flex; align-items:center; gap:12px; margin-bottom:22px;}
  .back-btn{
    background:var(--card); border:1px solid var(--line); border-radius:10px; width:38px; height:38px;
    display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--accent-dark);
    cursor:pointer; flex-shrink:0;
  }
  .top-title{font-size:17px; font-weight:700;}

  .opt-group{margin-bottom:22px;}
  .opt-label{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin-bottom:10px;}
  .opt-row{display:flex; gap:8px; flex-wrap:wrap;}
  .opt-chip{
    padding:10px 16px; border-radius:20px; font-size:13.5px; font-weight:600; background:var(--card);
    border:1.5px solid var(--line); color:var(--text-dim); cursor:pointer;
  }
  .opt-chip.active{background:var(--accent); border-color:var(--accent); color:white;}

  .start-btn{
    width:100%; background:var(--accent-dark); color:white; border:none; padding:15px; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px;
  }

  /* ---------- SESSION ---------- */
  .session-title{flex:1; min-width:0;}
  .session-title .name{font-size:15px; font-weight:700;}
  .session-title .pos{font-size:12px; color:var(--text-dim);}

  .progress-track{height:6px; background:var(--line); border-radius:10px; overflow:hidden; margin-bottom:26px;}
  .progress-fill{height:100%; background:var(--accent); border-radius:10px; transition:width .3s;}

  .card{
    background:var(--card); border-radius:22px; padding:26px 22px; margin-bottom:18px;
    border:1px solid var(--line); box-shadow:0 4px 16px rgba(46,51,39,0.05);
    min-height:220px; display:flex; flex-direction:column;
  }
  .tag{
    display:inline-block; align-self:flex-start; font-size:10.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; padding:4px 11px; border-radius:20px; margin-bottom:16px;
  }
  .tag.qcm{background:#E9EDE4; color:var(--accent-dark);}
  .tag.flashcard{background:#FBE9E2; color:#B4482F;}

  .question{font-size:18px; font-weight:600; margin-bottom:20px; line-height:1.45; flex-shrink:0;}

  .choice{
    display:block; width:100%; text-align:left; background:#FAFAF7; border:1.5px solid var(--line);
    border-radius:12px; padding:13px 16px; margin-bottom:9px; font-size:14.5px; color:var(--text);
    cursor:pointer; font-family:inherit;
  }
  .choice:active{transform:scale(0.98);}
  .choice.correct{background:#E9F5E6; border-color:var(--accent); color:var(--accent-dark); font-weight:600;}
  .choice.wrong{background:#FBEEEB; border-color:var(--accent2); color:#B4482F;}
  .choice:disabled{cursor:default;}

  .flip-zone{flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; text-align:center;}
  .flip-btn{
    background:var(--accent); color:white; border:none; padding:12px 22px; border-radius:12px;
    font-size:14.5px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .answer-reveal{font-size:16px; color:var(--accent-dark); font-weight:600; line-height:1.5; display:none;}
  .answer-reveal.show{display:block;}

  .fiche-link{display:inline-block; margin-top:14px; font-size:12.5px; color:var(--accent2); text-decoration:none;}

  .next-btn{
    width:100%; background:var(--accent-dark); color:white; border:none; padding:15px; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .next-btn.show{opacity:1; pointer-events:auto;}

  .recap{text-align:center; padding:50px 20px;}
  .recap .big{font-size:44px; margin-bottom:10px;}
  .recap h2{font-size:20px; margin:0 0 8px; color:var(--accent-dark);}
  .recap p{color:var(--text-dim); font-size:14px; margin-bottom:26px;}
  .recap .restart{
    background:var(--accent); color:white; border:none; padding:13px 24px; border-radius:12px;
    font-size:14.5px; font-weight:600; cursor:pointer; font-family:inherit; margin:0 6px;
  }
  .recap .ghost{background:transparent; color:var(--accent-dark); border:1.5px solid var(--line);}
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <header class="home">
      <h1>🎓 Révisions</h1>
      <div class="sub">Choisis un quiz pour commencer</div>
    </header>
    <div id="status" class="status">Chargement…</div>
    <select id="matiereSelect" class="matiere-select" style="display:none;" onchange="renderHome()"></select>
    <div id="progressSection"></div>
    <div id="homeContent"></div>
  </div>

  <!-- OPTIONS -->
  <div id="optionsScreen" class="screen">
    <div class="top-bar">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="top-title" id="optQuizTitle"></div>
    </div>
    <div class="opt-group">
      <div class="opt-label">Type de questions</div>
      <div class="opt-row">
        <div class="opt-chip active" data-val="tout" onclick="setOpt('type','tout',this)">Mélange</div>
        <div class="opt-chip" data-val="qcm" onclick="setOpt('type','qcm',this)">QCM seulement</div>
        <div class="opt-chip" data-val="flashcard" onclick="setOpt('type','flashcard',this)">Flashcards seulement</div>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-label">Ordre</div>
      <div class="opt-row">
        <div class="opt-chip active" data-val="ordre" onclick="setOpt('shuffle',false,this)">Dans l'ordre</div>
        <div class="opt-chip" data-val="aleatoire" onclick="setOpt('shuffle',true,this)">Aléatoire</div>
      </div>
    </div>
    <button class="start-btn" onclick="startQuizWithOptions()">Commencer</button>
  </div>

  <!-- SESSION -->
  <div id="sessionScreen" class="screen">
    <div class="top-bar">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="session-title">
        <div class="name" id="sessionName"></div>
        <div class="pos" id="sessionPos"></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div id="cardZone"></div>
  </div>

</div>

<script>
const SHEET_ID = "1yTjT6wCStPIL9E-JoCJfIWe8XOwjKSNOBmQvjL7MaDw";
const API_BASE = "https://opensheet.elk.sh/" + SHEET_ID;
const STORAGE_KEY = "revisions_done_quizzes";

const EMOJIS = ["📘","🧠","🔬","📗","🩺","📙","🦻","📕"];

let allQuizzes = [];
let allQuestions = [];
let currentQuiz = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let pendingOptions = { type: 'tout', shuffle: false };
let pendingQuizId = null;

const statusEl = document.getElementById('status');
const homeContent = document.getElementById('homeContent');
const matiereSelect = document.getElementById('matiereSelect');
const progressSection = document.getElementById('progressSection');

function getDoneSet(){
  try{ return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); }catch(e){ return new Set(); }
}
function markDone(idQuiz){
  const s = getDoneSet();
  s.add(String(idQuiz));
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...s]));
}

Promise.all([
  fetch(API_BASE + "/Quiz").then(r => { if(!r.ok) throw new Error('Quiz sheet: HTTP ' + r.status); return r.json(); }),
  fetch(API_BASE + "/Questions").then(r => { if(!r.ok) throw new Error('Questions sheet: HTTP ' + r.status); return r.json(); })
]).then(([quizzes, questions]) => {
  allQuizzes = quizzes;
  allQuestions = questions;
  statusEl.style.display = 'none';
  setupMatiereSelect();
  renderHome();
}).catch(err => {
  statusEl.className = 'status error';
  statusEl.textContent = "❌ Impossible de charger les données. Vérifie le partage du Sheet et les noms d'onglets (\"Quiz\" et \"Questions\").";
  console.error(err);
});

function getMatiere(q){
  return ((q.Matière || q.Matiere || 'Autre').trim()) || 'Autre';
}

function setupMatiereSelect(){
  const matieres = [...new Set(allQuizzes.map(getMatiere))];
  if(matieres.length <= 1) return;
  matiereSelect.style.display = 'block';
  matiereSelect.innerHTML = `<option value="__all__">Toutes les matières</option>` +
    matieres.map(m => `<option value="${escapeAttr(m)}">${escapeHtml(m)}</option>`).join('');
}

function renderHome(){
  if(allQuizzes.length === 0){
    homeContent.innerHTML = '<div class="empty">Aucun quiz pour l\'instant.<br>Ajoute une ligne dans l\'onglet "Quiz" de ton Sheet.</div>';
    progressSection.innerHTML = '';
    return;
  }
  const selected = matiereSelect.style.display !== 'none' ? matiereSelect.value : '__all__';
  const doneSet = getDoneSet();

  const byMatiere = {};
  allQuizzes.forEach(q => {
    const m = getMatiere(q);
    if(!byMatiere[m]) byMatiere[m] = [];
    byMatiere[m].push(q);
  });

  // Progress section (always shows all matières, regardless of filter)
  progressSection.innerHTML = `<div class="progress-section">
    <div class="progress-section-title">Progression</div>
    <div class="rings-row">
    ${Object.entries(byMatiere).map(([matiere, quizzes]) => {
      const total = quizzes.length;
      const done = quizzes.filter(q => doneSet.has(String(q.ID_Quiz))).length;
      const pct = total > 0 ? Math.round((done/total)*100) : 0;
      const r = 26, circ = 2 * Math.PI * r;
      const dash = circ * (pct/100);
      const isComplete = total > 0 && done === total;
      return `<div class="ring-item">
        <svg class="ring-svg" viewBox="0 0 64 64">
          <circle class="track" cx="32" cy="32" r="${r}"></circle>
          <circle class="fill ${isComplete?'complete':''}" cx="32" cy="32" r="${r}"
            stroke-dasharray="${dash} ${circ}"></circle>
          <text x="32" y="37" text-anchor="middle" class="ring-center" style="transform:none;">${isComplete?'✓':pct+'%'}</text>
        </svg>
        <div class="ring-name">${escapeHtml(matiere)}</div>
        <div class="ring-count">${done}/${total}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;

  const groupsToShow = selected === '__all__' ? Object.entries(byMatiere) : Object.entries(byMatiere).filter(([m]) => m === selected);

  homeContent.innerHTML = groupsToShow.map(([matiere, quizzes]) => {
    const cards = quizzes.map((q) => {
      const count = allQuestions.filter(qu => String(qu.ID_Quiz).trim() === String(q.ID_Quiz).trim()).length;
      const emoji = EMOJIS[Math.abs(hashCode(q.Titre || '')) % EMOJIS.length];
      const isDone = doneSet.has(String(q.ID_Quiz));
      return `<div class="quiz-card" onclick="openOptions('${escapeAttr(q.ID_Quiz)}')">
        <span class="quiz-emoji">${emoji}</span>
        <div class="quiz-info">
          <div class="quiz-title">${escapeHtml(q.Titre || 'Sans titre')} ${isDone ? '<span class="done-badge">✓</span>' : ''}</div>
          <div class="quiz-count">${count} question${count>1?'s':''}</div>
        </div>
        <span class="quiz-arrow">›</span>
      </div>`;
    }).join('');
    return `<div class="matiere-group">
      <div class="matiere-label">${escapeHtml(matiere)}</div>
      <div class="quiz-grid">${cards}</div>
    </div>`;
  }).join('');
}

function hashCode(str){
  let hash = 0;
  for(let i=0; i<str.length; i++){ hash = ((hash<<5)-hash) + str.charCodeAt(i); hash |= 0; }
  return hash;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){
  renderHome();
  showScreen('homeScreen');
}

/* ---------- OPTIONS SCREEN ---------- */
function openOptions(idQuiz){
  pendingQuizId = idQuiz;
  pendingOptions = { type: 'tout', shuffle: false };
  const quiz = allQuizzes.find(q => String(q.ID_Quiz).trim() === String(idQuiz).trim());
  document.getElementById('optQuizTitle').textContent = quiz ? quiz.Titre : '';
  document.querySelectorAll('#optionsScreen .opt-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('#optionsScreen .opt-chip[data-val="tout"]').classList.add('active');
  document.querySelector('#optionsScreen .opt-chip[data-val="ordre"]').classList.add('active');
  showScreen('optionsScreen');
}

function setOpt(key, val, el){
  pendingOptions[key] = val;
  const group = el.parentElement;
  group.querySelectorAll('.opt-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function startQuizWithOptions(){
  openQuiz(pendingQuizId, pendingOptions);
}

/* ---------- SESSION ---------- */
function openQuiz(idQuiz, options){
  currentQuiz = allQuizzes.find(q => String(q.ID_Quiz).trim() === String(idQuiz).trim());
  let qs = allQuestions.filter(q => String(q.ID_Quiz).trim() === String(idQuiz).trim());

  if(options && options.type && options.type !== 'tout'){
    qs = qs.filter(q => (q.Type||'').trim().toLowerCase() === options.type);
  }
  if(options && options.shuffle){
    qs = shuffleArray(qs.slice());
  }

  currentQuestions = qs;
  currentIndex = 0;
  score = 0;
  showScreen('sessionScreen');
  document.getElementById('sessionName').textContent = currentQuiz ? currentQuiz.Titre : '';
  renderCard();
}

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderCard(){
  const total = currentQuestions.length;
  if(total === 0){
    document.getElementById('cardZone').innerHTML = `<div class="empty">Aucune question ne correspond à ce filtre pour ce quiz.</div>`;
    return;
  }
  if(currentIndex >= total){
    renderRecap();
    return;
  }
  const row = currentQuestions[currentIndex];
  document.getElementById('sessionPos').textContent = `Question ${currentIndex+1} / ${total}`;
  document.getElementById('progressFill').style.width = `${(currentIndex/total)*100}%`;

  const type = (row.Type || '').trim().toLowerCase();
  const isQCM = type === 'qcm';
  let html = `<div class="card">
    <span class="tag ${isQCM?'qcm':'flashcard'}">${isQCM?'QCM':'Flashcard'}</span>
    <div class="question">${escapeHtml(row.Question)}</div>`;

  if(isQCM){
    const choices = [['A', row.Choix_A], ['B', row.Choix_B], ['C', row.Choix_C]].filter(c => c[1] && c[1].trim());
    html += choices.map(([letter, text]) =>
      `<button class="choice" data-letter="${letter}" onclick="answerQCM(this,'${escapeAttr((row.Bonne_Reponse||'').trim())}')">${escapeHtml(text)}</button>`
    ).join('');
    if(row.Lien_Fiche && row.Lien_Fiche.trim()){
      html += `<a class="fiche-link" href="${row.Lien_Fiche}" target="_blank">📄 Voir la fiche</a>`;
    }
    html += `</div><button class="next-btn" id="nextBtn" onclick="nextCard()">Suivant</button>`;
  } else {
    html += `<div class="flip-zone">
      <button class="flip-btn" id="flipBtn" onclick="flipCard()">Voir la réponse</button>
      <div class="answer-reveal" id="answerReveal">${escapeHtml(row.Bonne_Reponse)}</div>
    </div>`;
    if(row.Lien_Fiche && row.Lien_Fiche.trim()){
      html += `<a class="fiche-link" href="${row.Lien_Fiche}" target="_blank">📄 Voir la fiche</a>`;
    }
    html += `</div><button class="next-btn" id="nextBtn" onclick="nextCard()">Suivant</button>`;
  }

  document.getElementById('cardZone').innerHTML = html;
}

function answerQCM(btn, correct){
  const letter = btn.dataset.letter;
  const siblings = btn.parentElement.querySelectorAll('.choice');
  siblings.forEach(s => {
    s.disabled = true;
    if(s.dataset.letter === correct) s.classList.add('correct');
  });
  if(letter !== correct) btn.classList.add('wrong');
  else score++;
  document.getElementById('nextBtn').classList.add('show');
}

function flipCard(){
  document.getElementById('answerReveal').classList.add('show');
  document.getElementById('flipBtn').style.display = 'none';
  document.getElementById('nextBtn').classList.add('show');
}

function nextCard(){
  currentIndex++;
  renderCard();
}

function renderRecap(){
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('sessionPos').textContent = 'Terminé';
  const hasQCM = currentQuestions.some(q => (q.Type||'').trim().toLowerCase() === 'qcm');
  markDone(currentQuiz.ID_Quiz);
  document.getElementById('cardZone').innerHTML = `
    <div class="recap">
      <div class="big">🎉</div>
      <h2>Quiz terminé !</h2>
      <p>${hasQCM ? `Score : ${score} / ${currentQuestions.filter(q=>(q.Type||'').trim().toLowerCase()==='qcm').length} bonnes réponses` : `${currentQuestions.length} cartes revues`}</p>
      <button class="restart" onclick="openOptions('${escapeAttr(currentQuiz.ID_Quiz)}')">Recommencer</button>
      <button class="restart ghost" onclick="goHome()">Retour aux quiz</button>
    </div>`;
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escapeAttr(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
</script>
</body>
</html>
